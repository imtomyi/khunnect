server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # gzip 압축
    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # 해시된 정적 자산은 장기 캐시
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA 클라이언트 라우팅 — 존재하지 않는 경로는 index.html로 폴백
    # (TanStack Router 사용 시 /explore 등 직접 접근·새로고침 404 방지)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
