name: Deploy (Build & Push)

# main 푸시 시 amd64 이미지를 빌드해 GitHub Container Registry(ghcr.io)에 push한다.
# 시놀로지의 Watchtower가 새 이미지를 감지·pull하여 컨테이너를 자동 교체한다
# (포트를 외부에 열지 않는 outbound 방식 — SSH 보안 유지).
#
# 사전 준비 — GitHub repo Settings → Secrets and variables → Actions 에 등록:
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for Vite build
        run: |
          cat > frontend/.env <<EOF
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          EOF

      - name: Lowercase image owner
        id: img
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64        # 시놀로지(x86_64) 실행용
          push: true
          tags: |
            ghcr.io/${{ steps.img.outputs.owner }}/khunnect-frontend:latest
            ghcr.io/${{ steps.img.outputs.owner }}/khunnect-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
