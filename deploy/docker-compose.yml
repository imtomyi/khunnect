# 시놀로지(자가 서버) 배포 구성
# Container Manager → 프로젝트로 가져오거나, SSH에서 `docker compose up -d` 로 실행.
# <OWNER> 를 본인 GitHub 계정(소문자)으로 치환할 것.
#
# 동작: GitHub Actions가 ghcr.io에 새 이미지를 push하면
#       Watchtower가 5분 주기로 감지·pull하여 khunnect 컨테이너를 자동 교체한다.

services:
  khunnect:
    image: ghcr.io/imtomyi/khunnect-frontend:latest
    container_name: khunnect
    restart: unless-stopped
    ports:
      - "8080:80"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup khunnect
    # ghcr.io의 비공개 이미지를 pull하려면 아래 인증 파일이 필요하다.
    # docker login ghcr.io 후 ~/.docker/config.json 을 마운트:
    #   - /volume1/docker/khunnect/config.json:/config.json:ro
